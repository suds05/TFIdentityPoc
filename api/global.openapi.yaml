# // OpenAPI 3 contract for the Global tier (health and Discover endpoints).
# //

openapi: 3.0.3
info:
  title: Global Tier API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Liveness check
      responses:
        "200":
          description: Service is alive
  /v1/discover:
    get:
      summary: Discover teams accessible to the caller
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Teams the user can access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
        "401":
          description: Missing or invalid JWT, or user not found in GlobalDB
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DiscoverResponse:
      type: object
      required:
        - teamIds
        - teams
      properties:
        teamIds:
          type: array
          items:
            type: string
          example: ["engineering", "marketing"]
        teams:
          type: array
          items:
            $ref: "#/components/schemas/TeamRoute"
    TeamRoute:
      type: object
      required:
        - teamId
        - storageTierId
      properties:
        teamId:
          type: string
        storageTierId:
          type: integer
